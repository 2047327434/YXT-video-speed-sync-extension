<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>视频倍速同步助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🎬 视频倍速同步助手</h1>
      <span class="version">v1.0</span>
    </header>

    <!-- 视频列表 -->
    <section class="section" id="videoSection">
      <div class="section-title">
        <span>📹 检测到的视频</span>
        <span class="badge" id="videoCount">0</span>
      </div>
      <div class="video-list" id="videoList">
        <div class="empty-state">当前页面未检测到视频</div>
      </div>
    </section>

    <!-- 倍速控制 -->
    <section class="section">
      <div class="section-title">⚡ 倍速控制</div>
      <div class="speed-display">
        <span id="currentSpeed">1.0</span><span class="unit">x</span>
      </div>
      <div class="speed-buttons">
        <button class="speed-btn" data-speed="0.5">0.5x</button>
        <button class="speed-btn" data-speed="0.75">0.75x</button>
        <button class="speed-btn active" data-speed="1.0">1.0x</button>
        <button class="speed-btn" data-speed="1.25">1.25x</button>
        <button class="speed-btn" data-speed="1.5">1.5x</button>
        <button class="speed-btn" data-speed="2.0">2.0x</button>
        <button class="speed-btn" data-speed="3.0">3.0x</button>
      </div>
      <div class="speed-slider-container">
        <input type="range" id="speedSlider" min="0.25" max="20" step="0.05" value="1">
        <div class="speed-slider-labels">
          <span>0.25x</span>
          <span>20x</span>
        </div>
      </div>
      <div class="speed-actions">
        <button class="btn btn-secondary" id="btnDecSpeed">
          <span>➖</span> 减速
        </button>
        <button class="btn btn-secondary" id="btnResetSpeed">
          <span>↺</span> 重置
        </button>
        <button class="btn btn-secondary" id="btnIncSpeed">
          <span>➕</span> 加速
        </button>
      </div>
    </section>

    <!-- 快捷操作 -->
    <section class="section">
      <div class="section-title">🎮 快捷操作</div>
      <div class="quick-actions">
        <button class="btn btn-primary" id="btnTogglePlay">▶️ 播放/暂停</button>
        <button class="btn btn-secondary" id="btnSkipBack">⏪ -10秒</button>
        <button class="btn btn-secondary" id="btnSkipForward">⏩ +10秒</button>
      </div>
    </section>

    <!-- 联网同步 -->
    <section class="section">
      <div class="section-title">
        <span>🌐 联网同步</span>
        <span class="status-indicator" id="syncStatus">未连接</span>
      </div>
      <div class="sync-form" id="syncForm">
        <div class="input-group">
          <label>服务器地址</label>
          <input type="text" id="syncUrl" placeholder="wss://your-server.com/ws" value="wss://your-server.com/ws">
        </div>
        <div class="input-group">
          <label>房间ID</label>
          <input type="text" id="syncRoomId" placeholder="输入房间号">
        </div>
        <div class="sync-options">
          <label class="checkbox-label">
            <input type="checkbox" id="chkAsMaster">
            <span>作为主控端（控制其他设备）</span>
          </label>
        </div>
        <button class="btn btn-primary btn-block" id="btnConnect">连接同步</button>
      </div>
      <div class="sync-connected" id="syncConnected" style="display:none;">
        <div class="sync-info">
          <div class="info-row">
            <span class="info-label">房间ID</span>
            <span class="info-value" id="connectedRoomId">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">角色</span>
            <span class="info-value" id="connectedRole">-</span>
          </div>
        </div>
        <button class="btn btn-danger btn-block" id="btnDisconnect">断开连接</button>
      </div>
    </section>

    <!-- 快捷键提示 -->
    <section class="section shortcuts">
      <div class="section-title">⌨️ 快捷键</div>
      <div class="shortcut-list">
        <div class="shortcut-item">
          <kbd>Alt + ,</kbd>
          <span>减速 0.25x</span>
        </div>
        <div class="shortcut-item">
          <kbd>Alt + .</kbd>
          <span>加速 0.25x</span>
        </div>
        <div class="shortcut-item">
          <kbd>Alt + R</kbd>
          <span>重置倍速</span>
        </div>
        <div class="shortcut-item">
          <kbd>Alt + P</kbd>
          <span>播放/暂停</span>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>视频倍速同步助手</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
