<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>云学堂自动挂课助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📚 云学堂自动挂课</h1>
      <span class="version">v2.0</span>
    </header>

    <!-- 状态卡片 -->
    <section class="section status-card">
      <div class="status-indicator" id="statusIndicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">未启动</span>
      </div>
      <div class="status-detail" id="statusDetail">点击"开始挂机"自动刷课</div>
    </section>

    <!-- 控制按钮 -->
    <section class="section">
      <div class="control-buttons">
        <button class="btn btn-primary btn-large" id="btnStart">
          <span>▶️</span> 开始挂机
        </button>
        <button class="btn btn-danger btn-large" id="btnStop" style="display:none;">
          <span>⏹️</span> 停止挂机
        </button>
      </div>

      <div class="options">
        <label class="checkbox-label">
          <input type="checkbox" id="chkIdleMode" checked>
          <span>🔇 后台静默模式（自动静音）</span>
        </label>
      </div>
    </section>

    <!-- 视频进度 -->
    <section class="section" id="videoSection">
      <div class="section-title">📹 当前视频</div>
      <div class="video-info" id="videoInfo">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-text">
          <span id="currentTime">00:00</span>
          <span id="progressPercent">0%</span>
          <span id="duration">00:00</span>
        </div>
      </div>
    </section>

    <!-- 挂机统计 -->
    <section class="section">
      <div class="section-title">📊 挂机统计</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="statRuntime">00:00</div>
          <div class="stat-label">运行时长</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statCourses">0</div>
          <div class="stat-label">已完成课程</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statStatus">等待中</div>
          <div class="stat-label">当前状态</div>
        </div>
      </div>
    </section>

    <!-- 快捷操作 -->
    <section class="section">
      <div class="section-title">🎮 快捷操作</div>
      <div class="quick-actions">
        <button class="btn btn-secondary" id="btnSkipNext">⏭️ 跳过当前课</button>
        <button class="btn btn-secondary" id="btnRefresh">🔄 刷新状态</button>
      </div>
    </section>

    <!-- 功能说明 -->
    <section class="section shortcuts">
      <div class="section-title">💡 功能说明</div>
      <div class="feature-list">
        <div class="feature-item">
          <span class="feature-icon">▶️</span>
          <span>自动播放视频，无需手动点击</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">⏭️</span>
          <span>视频结束后自动切换下一课</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🛡️</span>
          <span>页面失焦自动保活，防暂停</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🎭</span>
          <span>随机模拟暂停，绕过反作弊</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">❌</span>
          <span>自动关闭提示弹窗</span>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>云学堂自动挂课助手 v2.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
